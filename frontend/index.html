<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mighty Drunks</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <div class="header-top">
      <div class="logo-circle">
        <img src="/images/logo.png" alt="Mighty Drunks Logo" />
      </div>
      <div class="header-text">
        <div class="team-name">Mighty Drunks</div>
        <div class="team-sub">Hockey Club</div>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="roster" role="tab" aria-selected="true">Roster</button>
      <button class="tab-btn" data-tab="stats" role="tab" aria-selected="false">Stats</button>
      <button class="tab-btn" data-tab="schedule" role="tab" aria-selected="false">Schedule</button>
      <button class="tab-btn" data-tab="scores" role="tab" aria-selected="false">Scores</button>
    </nav>
  </header>

  <main class="content">

    <!-- ROSTER -->
    <section class="tab-panel active" id="tab-roster" role="tabpanel">
      <h2 class="section-title">Roster</h2>
      <div class="table-container">
        <table id="rosterTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Position</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- STATS -->
    <section class="tab-panel" id="tab-stats" role="tabpanel">
      <h2 class="section-title">Stats</h2>
      <div class="table-container">
        <table id="statsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>G</th>
              <th>A</th>
              <th>GP</th>
              <th>PTS</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- SCHEDULE -->
    <section class="tab-panel" id="tab-schedule" role="tabpanel">
      <h2 class="section-title">Schedule</h2>
      <div class="table-container">
        <table id="scheduleTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Home</th>
              <th></th>
              <th>Away</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- SCORES -->
    <section class="tab-panel" id="tab-scores" role="tabpanel">
      <h2 class="section-title">Scores</h2>
      <div class="table-container">
        <table id="scoresTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Home</th>
              <th></th>
              <th>Away</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

  </main>

  <div class="field-texture"></div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
